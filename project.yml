name: AudioScribe
options:
  bundleIdPrefix: com.hammadahmad
  deploymentTarget:
    iOS: "17.0"
    macOS: "14.0"
  developmentLanguage: en
  createIntermediateGroups: true
  generateEmptyDirectories: true
  groupSortPosition: top

settings:
  base:
    SWIFT_VERSION: "5.10"
    SWIFT_STRICT_CONCURRENCY: minimal
    CODE_SIGN_STYLE: Automatic
    DEAD_CODE_STRIPPING: YES
    ENABLE_USER_SCRIPT_SANDBOXING: NO
    GCC_TREAT_WARNINGS_AS_ERRORS: NO
    SWIFT_TREAT_WARNINGS_AS_ERRORS: NO

packages:
  WhisperKit:
    url: https://github.com/argmaxinc/WhisperKit
    from: "0.13.0"

targets:
  AudioScribe:
    type: application
    supportedDestinations: [iOS, macOS]
    sources:
      - path: AudioScribe
        excludes:
          - "Resources/Info.plist"
    resources:
      - path: AudioScribe/Resources/Assets.xcassets
    info:
      path: AudioScribe/Resources/Info.generated.plist
      properties:
        CFBundleDisplayName: AudioScribe
        CFBundleShortVersionString: "1.0"
        CFBundleVersion: "1"
        LSApplicationCategoryType: public.app-category.productivity
        NSMicrophoneUsageDescription: "AudioScribe records audio for on-device transcription. Audio never leaves your device."
        NSSpeechRecognitionUsageDescription: "AudioScribe uses on-device speech recognition to create transcripts."
        UILaunchScreen:
          UIColorName: ""
          UIImageName: ""
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
    entitlements:
      path: AudioScribe/Resources/AudioScribe.entitlements
      properties:
        com.apple.security.app-sandbox: true
        com.apple.security.device.audio-input: true
        com.apple.security.network.client: true
        com.apple.security.files.user-selected.read-write: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.hammadahmad.audioscribe
        PRODUCT_NAME: AudioScribe
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        TARGETED_DEVICE_FAMILY: "1,2"
        ENABLE_PREVIEWS: YES
        GENERATE_INFOPLIST_FILE: NO
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        SWIFT_EMIT_LOC_STRINGS: YES
        CODE_SIGN_ENTITLEMENTS: AudioScribe/Resources/AudioScribe.entitlements
        DEVELOPMENT_TEAM: ""
      configs:
        Debug:
          SWIFT_ACTIVE_COMPILATION_CONDITIONS: DEBUG
          ONLY_ACTIVE_ARCH: YES
        Release:
          SWIFT_OPTIMIZATION_LEVEL: -O
    dependencies:
      - package: WhisperKit
        product: WhisperKit

  AudioScribeTests:
    type: bundle.unit-test
    supportedDestinations: [iOS, macOS]
    sources:
      - AudioScribeTests
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.hammadahmad.audioscribe.tests
        GENERATE_INFOPLIST_FILE: YES
        BUNDLE_LOADER: "$(TEST_HOST)"
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/AudioScribe.app/$(BUNDLE_EXECUTABLE_FOLDER_PATH)/AudioScribe"
    dependencies:
      - target: AudioScribe

schemes:
  AudioScribe:
    build:
      targets:
        AudioScribe: all
        AudioScribeTests: [test]
    test:
      targets:
        - AudioScribeTests
      gatherCoverageData: true
    run:
      config: Debug
    archive:
      config: Release
